# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else -%}
## [Unreleased]
{%- endif %}
{%- for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{%- for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}
{%- endfor %}

{%- endfor %}
"""

trim = true
render_always = true

[git]

# Use conventional commits
conventional_commits = true

# Ignore non-conventional commits
filter_unconventional = true

# Only include commits matched by parsers
filter_commits = true

# Ensure breaking changes are never filtered
protect_breaking_commits = true

split_commits = false

commit_preprocessors = []

commit_parsers = [
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^perf", group = "⚡ Performance Improvements" },
    { body = ".*security", group = "🛡 Security" },
    { message = "^revert", group = "◀️ Reverts" }
]

link_parsers = []

use_branch_tags = false

topo_order = false
topo_order_commits = true

sort_commits = "oldest"

recurse_submodules = false
